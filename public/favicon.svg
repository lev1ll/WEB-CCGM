<svg xmlns="http://www.w3.org/2000/svg" viewBox="75 118 270 278">
  <!-- Círculo dorado -->
  <circle cx="210" cy="255" r="132" fill="none" stroke="#C9A227" stroke-width="8"/>

  <!-- Cuadrado negro -->
  <rect x="110" y="158" width="138" height="132" fill="#1C1814"/>

  <!-- Cuadrado amarillo -->
  <rect x="182" y="228" width="124" height="108" fill="#F0C030"/>

  <!-- Cuadrado rojo -->
  <rect x="103" y="265" width="96" height="84" fill="#CC2200"/>

  <!-- Gabriela — dorado sobre negro -->
  <text
    x="118" y="223"
    font-family="'Dancing Script', Georgia, serif"
    font-weight="700"
    font-size="52"
    fill="#F0C030"
  >Gabriela</text>

  <!-- Mistral — blanco sobre amarillo para que contraste -->
  <text
    x="186" y="310"
    font-family="'Dancing Script', Georgia, serif"
    font-weight="700"
    font-size="50"
    fill="white"
  >Mistral</text>
</svg>
